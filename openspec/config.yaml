# openspec/config.yaml — Dominó Occidental v2.0
# Generated by sdd-init on 2026-06-25
schema: spec-driven

context: |
  Tech stack: Next.js 16 (App Router), React 19, Elysia (Bun), Supabase (PostgreSQL,
    Auth, Realtime), Drizzle ORM, Zustand, Stripe, Tailwind CSS 4, Biome, Sentry
  Architecture: Next.js SSR/SSG frontend + Elysia REST/WS backend in Bun runtime.
    Supabase for DB, auth, and real-time. Game state in ephemeral memory, persisted
    after match ends.
  Testing: bun test (built-in) for unit/integration, Cypress for E2E, Playwright for
    visual, k6 for WS load testing. No test framework configured yet — planned.
  Style: TypeScript strict mode, Biome (lint + format + organize imports),
    React Compiler enabled, conventional commits.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Reference AGENTS.md for architecture constraints
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Reference types from src/game/types.ts when available
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "bun test"
  verify:
    test_command: "bun test"
    build_command: "bun run build"
    coverage_threshold: 80
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  runner:
    command: bun test
    framework: bun:test (built-in Bun test runner)
  layers:
    unit:
      available: true
      tool: bun:test
    integration:
      available: true
      tool: Bun + Supabase CLI
    e2e:
      available: false
      tool: Cypress (planned)
    load:
      available: false
      tool: k6 (planned)
    visual:
      available: false
      tool: Playwright (planned)
  coverage:
    available: true
    command: bun test --coverage
    threshold: 80
  quality:
    linter:
      available: true
      command: bun run lint (biome check)
    type_checker:
      available: true
      command: tsc --noEmit
    formatter:
      available: true
      command: bun run format (biome format --write)
